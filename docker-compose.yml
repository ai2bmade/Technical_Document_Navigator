services:
  app:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      APP_DATA_DIR: /data
      DATABASE_URL: postgresql://industrial:industrial@postgres:5432/industrial_copilot
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      TESSERACT_CMD: tesseract
      OCR_LANG: kor+eng
      OCR_DPI: 220
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
    volumes:
      - industrial_data:/data
    depends_on:
      - postgres
      - chroma

  telegram-bot:
    build: .
    command: python -m app.telegram_bot
    environment:
      APP_DATA_DIR: /data
      DATABASE_URL: postgresql://industrial:industrial@postgres:5432/industrial_copilot
      CHROMA_HOST: chroma
      CHROMA_PORT: 8000
      TESSERACT_CMD: tesseract
      OCR_LANG: kor+eng
      OCR_DPI: 220
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.2}
    volumes:
      - industrial_data:/data
    depends_on:
      - app
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: industrial
      POSTGRES_PASSWORD: industrial
      POSTGRES_DB: industrial_copilot
    volumes:
      - postgres_data:/var/lib/postgresql/data

  chroma:
    image: chromadb/chroma:latest
    volumes:
      - chroma_data:/chroma/chroma

volumes:
  industrial_data:
  postgres_data:
  chroma_data:
